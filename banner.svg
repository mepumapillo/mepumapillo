<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111118;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="70%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#0F68FD;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowLeft" cx="15%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#0A4FCC;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F68FD;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#0F68FD;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#4A8FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A8FFF;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A8FFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0F68FD;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F68FD;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0A4FCC;stop-opacity:0.2" />
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="900" height="280" rx="16" ry="16"/>
    </clipPath>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="barGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <g clip-path="url(#roundClip)">
    <rect width="900" height="280" fill="url(#bgGrad)"/>
    <rect width="900" height="280" fill="url(#gridPattern)"/>
    <rect width="900" height="280" fill="url(#glowGrad)"/>
    <rect width="900" height="280" fill="url(#glowLeft)"/>

    <g filter="url(#barGlow)" opacity="0.85">
      <rect x="610" y="190" width="22" height="0" rx="3" fill="url(#barGrad2)">
        <animate attributeName="height" from="0" to="55" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="135" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <rect x="640" y="190" width="22" height="0" rx="3" fill="url(#barGrad1)">
        <animate attributeName="height" from="0" to="85" dur="1.2s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="105" dur="1.2s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <rect x="670" y="190" width="22" height="0" rx="3" fill="url(#barGrad2)">
        <animate attributeName="height" from="0" to="40" dur="1.2s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="150" dur="1.2s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <rect x="700" y="190" width="22" height="0" rx="3" fill="url(#barGrad1)">
        <animate attributeName="height" from="0" to="100" dur="1.2s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="90" dur="1.2s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <rect x="730" y="190" width="22" height="0" rx="3" fill="url(#barGrad2)">
        <animate attributeName="height" from="0" to="65" dur="1.2s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="125" dur="1.2s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <rect x="760" y="190" width="22" height="0" rx="3" fill="url(#barGrad1)">
        <animate attributeName="height" from="0" to="115" dur="1.2s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="75" dur="1.2s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <rect x="790" y="190" width="22" height="0" rx="3" fill="url(#barGrad2)">
        <animate attributeName="height" from="0" to="78" dur="1.2s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="112" dur="1.2s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <rect x="820" y="190" width="22" height="0" rx="3" fill="url(#barGrad1)">
        <animate attributeName="height" from="0" to="130" dur="1.2s" begin="1.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="60" dur="1.2s" begin="1.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <rect x="850" y="190" width="22" height="0" rx="3" fill="url(#barGrad1)" opacity="0.6">
        <animate attributeName="height" from="0" to="90" dur="1.2s" begin="1.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
        <animate attributeName="y" from="190" to="100" dur="1.2s" begin="1.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
    </g>

    <line x1="605" y1="192" x2="880" y2="192" stroke="rgba(15,104,253,0.3)" stroke-width="1"/>

    <polyline points="621,155 651,115 681,160 711,98 741,134 771,80 801,118 831,65 861,105"
      fill="none" stroke="#4A8FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0">
      <animate attributeName="opacity" from="0" to="0.8" dur="0.5s" begin="2s" fill="freeze"/>
    </polyline>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
      <circle cx="621" cy="155" r="3" fill="#4A8FFF"/>
      <circle cx="651" cy="115" r="3" fill="#4A8FFF"/>
      <circle cx="681" cy="160" r="3" fill="#4A8FFF"/>
      <circle cx="711" cy="98" r="3" fill="#4A8FFF"/>
      <circle cx="741" cy="134" r="3" fill="#4A8FFF"/>
      <circle cx="771" cy="80" r="3" fill="#4A8FFF"/>
      <circle cx="801" cy="118" r="3" fill="#4A8FFF"/>
      <circle cx="831" cy="65" r="4" fill="#fff" stroke="#4A8FFF" stroke-width="2"/>
      <circle cx="861" cy="105" r="3" fill="#4A8FFF"/>
    </g>

    <rect x="0" y="272" width="900" height="1.5" fill="url(#lineGrad)" opacity="0.6"/>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.1s" fill="freeze"/>
      <rect x="50" y="72" width="5" height="18" rx="1.5" fill="#0F68FD"/>
      <rect x="58" y="63" width="5" height="27" rx="1.5" fill="#4A8FFF"/>
      <rect x="66" y="68" width="5" height="22" rx="1.5" fill="#0F68FD" opacity="0.7"/>
    </g>

    <text x="82" y="93" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.2s" fill="freeze"/>
      Miguel<tspan fill="#0F68FD"> Analytics</tspan>
    </text>

    <rect x="50" y="108" width="0" height="1.5" rx="1" fill="#0F68FD" opacity="0.6">
      <animate attributeName="width" from="0" to="180" dur="0.7s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
    </rect>

    <text font-family="'Segoe UI', Arial, sans-serif" font-weight="800" fill="#FFFFFF" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.6s" fill="freeze"/>
      <tspan x="50" y="160" font-size="40" letter-spacing="-1">Escala con datos</tspan>
    </text>
    <text x="50" y="210" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" fill="#0F68FD" font-size="40" letter-spacing="-1" filter="url(#textGlow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.8s" fill="freeze"/>
      confiables.
    </text>

    <text x="50" y="236" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#B0B0B8" letter-spacing="0.2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1s" fill="freeze"/>
      Web Analytics · GA4 · BigQuery · Data-Driven Marketing
    </text>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.2s" fill="freeze"/>
      <rect x="50" y="248" width="190" height="24" rx="12" fill="rgba(15,104,253,0.15)" stroke="#0F68FD" stroke-width="1" stroke-opacity="0.5"/>
      <text x="145" y="264" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" fill="#4A8FFF" text-anchor="middle" letter-spacing="0.5">miguelanalytics.dev</text>
    </g>

    <g opacity="0.5">
      <circle cx="310" cy="80" r="1.5" fill="#0F68FD">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="380" cy="140" r="1" fill="#4A8FFF">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="200" r="2" fill="#0F68FD">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="420" cy="60" r="1.5" fill="#4A8FFF">
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="480" cy="180" r="1" fill="#0F68FD">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.8s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="550" cy="110" r="2" fill="#4A8FFF">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <line x1="310" y1="80" x2="380" y2="140" stroke="#0F68FD" stroke-width="0.4" opacity="0.15"/>
    <line x1="380" y1="140" x2="340" y2="200" stroke="#0F68FD" stroke-width="0.4" opacity="0.15"/>
    <line x1="420" y1="60" x2="480" y2="180" stroke="#4A8FFF" stroke-width="0.4" opacity="0.15"/>
    <line x1="480" y1="180" x2="550" y2="110" stroke="#4A8FFF" stroke-width="0.4" opacity="0.15"/>

    <rect width="900" height="280" rx="16" ry="16" fill="none" stroke="rgba(15,104,253,0.2)" stroke-width="1.5"/>
  </g>
</svg>
